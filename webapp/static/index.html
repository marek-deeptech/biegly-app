<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biegły GPW — analiza akt</title>
<style>
  :root{
    --bg:#f6f5f1; --surface:#ffffff; --ink:#1c1b19; --muted:#6b6a65; --line:#e3e1da;
    --accent:#2f5d50; --accent-soft:#e7efeb; --in:#2f5d50; --out:#8a5a2b;
    --ok:#2f7d4f; --bad:#b23b3b; --warn:#9a6a14; --radius:10px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5}
  header{padding:20px 28px;border-bottom:1px solid var(--line);background:var(--surface)}
  header h1{margin:0;font-size:19px;font-weight:600}
  header p{margin:4px 0 0;color:var(--muted);font-size:13px}
  main{max-width:1080px;margin:0 auto;padding:22px 28px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
  .controls input{flex:1;min-width:220px;padding:9px 11px;border:1px solid var(--line);
    border-radius:8px;font-size:13px;font-family:inherit}
  button{font-family:inherit;font-size:13px;cursor:pointer;border-radius:8px;border:1px solid var(--line);
    background:var(--surface);padding:9px 13px;color:var(--ink)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.chip{background:var(--accent-soft);border-color:var(--accent-soft);color:var(--accent);font-weight:500}
  button:hover{filter:brightness(0.97)}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
  .stat .num{font-size:24px;font-weight:600}
  .stat .lbl{color:var(--muted);font-size:12px;margin-top:2px}
  .bar{height:14px;border-radius:7px;overflow:hidden;display:flex;border:1px solid var(--line)}
  .bar i{display:block;height:100%}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:6px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .card h2{margin:0 0 12px;font-size:14px;font-weight:600}
  .row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
  .b-in{background:var(--accent-soft);color:var(--in)}
  .b-out{background:#f1e7da;color:var(--out)}
  .b-ok{background:#e3f0e7;color:var(--ok)}
  .b-bad{background:#f6e2e2;color:var(--bad)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td,th{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:500;font-size:12px}
  td.n{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;width:46px}
  .muted{color:var(--muted);font-size:12px}
  details{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin-top:18px}
  summary{cursor:pointer;font-weight:600;font-size:14px}
  .unk{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
  .unk span{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .unk select{font-size:12px;padding:5px;border:1px solid var(--line);border-radius:6px}
  @media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>Biegły GPW — analiza akt sprawy</h1>
  <p>Moduł 1–2: wgranie, klasyfikacja dokumentów i checklista kompletności kanonu</p>
</header>
<main>
  <div class="controls">
    <span id="chips" class="muted">Sprawy:</span>
    <input id="path" placeholder="ścieżka do katalogu sprawy…">
    <button class="primary" onclick="run()">Klasyfikuj</button>
  </div>
  <div id="out"></div>
</main>
<script>
let DATA=null, manual=0;

async function boot(){
  const cases = await (await fetch('/api/cases')).json();
  const chips = document.getElementById('chips');
  for(const [slug,name] of Object.entries(cases)){
    const b=document.createElement('button'); b.className='chip'; b.textContent=name;
    b.onclick=()=>loadCase(slug);
    chips.appendChild(b);
  }
}
async function loadCase(slug){
  document.getElementById('out').innerHTML='<p class="muted">Wczytuję inwentarz…</p>';
  const r=await fetch('/cases/'+slug);
  if(!r.ok){document.getElementById('out').innerHTML='<p class="b-bad badge">Brak danych sprawy</p>';return;}
  DATA=await r.json(); document.getElementById('path').value=DATA.path; manual=0; render();
}
async function run(name){
  const path=document.getElementById('path').value.trim(); if(!path) return;
  document.getElementById('out').innerHTML='<p class="muted">Klasyfikuję…</p>';
  const r=await fetch('/api/classify',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({path,name})});
  if(!r.ok){document.getElementById('out').innerHTML='<p class="b-bad badge">Błąd: sprawdź ścieżkę</p>';return;}
  DATA=await r.json(); manual=0; render();
}
function render(){
  const d=DATA, inN=d.prov['wejście']||0, outN=d.prov['wyjście']||0, unk=d.unknown.length;
  const pct=Math.round((d.classified/d.total)*100);
  const opt=d.doc_types.map(t=>`<option value="${t.code}|${t.label}">${t.label}</option>`).join('');
  const checklistOk=d.checklist.every(c=>c.present);
  document.getElementById('out').innerHTML=`
   <div class="stats">
     <div class="stat"><div class="num">${d.total}</div><div class="lbl">plików w sprawie</div></div>
     <div class="stat"><div class="num">${pct}%</div><div class="lbl">sklasyfikowanych${manual?` (+${manual} ręcznie)`:''}</div></div>
     <div class="stat"><div class="num" style="color:var(--in)">${inN}</div><div class="lbl">wejście (dowody)</div></div>
     <div class="stat"><div class="num" style="color:var(--out)">${outN}</div><div class="lbl">wyjście (biegły)</div></div>
   </div>
   <div class="bar" title="proporcja wejście / wyjście">
     <i style="width:${inN/(inN+outN)*100}%;background:var(--in)"></i>
     <i style="width:${outN/(inN+outN)*100}%;background:var(--out)"></i>
   </div>
   <div class="grid">
     <div class="card">
       <h2>Checklista kanonu ${checklistOk?'<span class="badge b-ok">komplet</span>':'<span class="badge b-bad">braki</span>'}</h2>
       ${d.checklist.map(c=>`<div class="row"><span>${c.label}</span>
         <span class="badge ${c.present?'b-ok':'b-bad'}">${c.present?'obecny':'BRAK'}</span></div>`).join('')}
       <h2 style="margin-top:16px">Zalecane</h2>
       ${d.recommended.map(c=>`<div class="row"><span>${c.label}</span>
         <span class="badge ${c.present?'b-ok':'b-bad'}">${c.present?'obecny':'brak'}</span></div>`).join('')}
     </div>
     <div class="card">
       <h2>Inwentarz wg typu (${d.by_type.length})</h2>
       <table><thead><tr><th>Typ dokumentu</th><th>Proweniencja</th><th class="n">Szt.</th></tr></thead>
       <tbody id="invbody">${invRows()}</tbody></table>
     </div>
   </div>
   <details>
     <summary>Do ręcznej / AI klasyfikacji — ${unk} <span class="muted">(strefa fallbacku)</span></summary>
     <p class="muted">Przypisz typ ręcznie — licznik zaktualizuje się natychmiast.</p>
     <div id="unklist">${d.unknown.map((p,i)=>`<div class="unk" data-i="${i}">
        <span title="${p}">${p}</span>
        <select onchange="assign(${i},this.value)"><option value="">— wybierz typ —</option>${opt}</select>
      </div>`).join('')}</div>
   </details>`;
}
function invRows(){
  return DATA.by_type.map(t=>`<tr><td>${t.label}</td>
    <td><span class="badge ${t.prov==='wejście'?'b-in':'b-out'}">${t.prov}</span></td>
    <td class="n">${t.count}</td></tr>`).join('');
}
function assign(i,val){
  if(!val) return;
  const [code,label]=val.split('|');
  const row=DATA.by_type.find(t=>t.code===code);
  if(row) row.count++; else DATA.by_type.push({code,label,count:1,
    prov: code==='OPINIA_BIEGLEGO'||code==='SUBANALIZA'||code==='RECENZJA_UWAGI'?'wyjście':'wejście'});
  DATA.by_type.sort((a,b)=>b.count-a.count);
  DATA.classified++; manual++;
  DATA.unknown.splice(i,1);
  const provKey = (code==='OPINIA_BIEGLEGO'||code==='SUBANALIZA'||code==='RECENZJA_UWAGI')?'wyjście':'wejście';
  DATA.prov[provKey]=(DATA.prov[provKey]||0)+1;
  render();
}
boot();
</script>
</body>
</html>
